<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <h1>SecureBank Admin Dashboard</h1>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h3>All Accounts</h3>
            <button id="btn-get-all">Load All Accounts</button>
            <div id="all-accounts-result" class="result-box"></div>
        </div>

        <div class="card">
            <h3>Find Account</h3>
            <input type="number" id="find-id" placeholder="Enter Account ID">
            <button id="btn-find">Search</button>
            <div id="find-result" class="result-box"></div>
        </div>

        <div class="card">
            <h3>Transactions</h3>
            <input type="number" id="trans-id" placeholder="Account ID">
            <input type="number" id="trans-amount" placeholder="Amount (₹)">
            <div class="btn-group">
                <button id="btn-deposit" class="btn-green">Deposit</button>
                <button id="btn-withdraw" class="btn-red">Withdraw</button>
            </div>
            <div id="trans-result" class="result-box"></div>
        </div>

        <div class="card">
            <h3>Delete Account</h3>
            <input type="number" id="del-id" placeholder="Enter Account ID">
            <button id="btn-delete" class="btn-red">Delete</button>
            <div id="del-result" class="result-box"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
